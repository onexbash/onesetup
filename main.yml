---
# -- -- -- -- -- -- -- -- #
# --   MAIN PLAYBOOK   -- #
- name: "onesetup"
  # -- CONNECTION -- #
  hosts: localhost
  connection: local
  # -- VARIABLES -- #
  vars:
    ONESETUP_DIR: "{{ lookup('ansible.builtin.env', 'ONESETUP_DIR') }}"
    ONESETUP_REPO: "{{ lookup('ansible.builtin.env', 'ONESETUP_REPO') }}"
    DOTFILES_DIR: "{{ lookup('ansible.builtin.env', 'DOTFILES_DIR') }}"
    DOTFILES_REPO: "{{ lookup('ansible.builtin.env', 'DOTFILES_REPO') }}"
    DOTFILES_REPO_HTTPS: "https://github.com/{{ DOTFILES_REPO }}.git"
    DOTFILES_REPO_SSH: "git@github.com:{{ DOTFILES_REPO }}.git"
    USER: "{{ lookup('ansible.builtin.env', 'USER') }}"
    HOME: "{{ lookup('ansible.builtin.env', 'HOME') }}"
    XDG_CONFIG_HOME: "{{ lookup('ansible.builtin.env', 'XDG_CONFIG_HOME', default=HOME + '/.config/') }}"
    ZDOTDIR: "{{ lookup('ansible.builtin.env', 'ZDOTDIR') | default(lookup('ansible.builtin.env', 'HOME') + '/.config/zsh') }}"
    CARGO_HOME: "{{ lookup('ansible.builtin.env', 'CARGO_HOME', default=HOME + '/.config/cargo') }}"
  vars_files:
    - group_vars/encrypted/ssh.yml
  pre_tasks:
    # -- INCLUDE PRE_TASKS -- #
    # common
    - name: "pre_tasks | common - prerequisites"
      include_tasks: pre_tasks/common/prerequisites.yml
    - name: "pre_tasks | common - tbd"
      include_tasks: pre_tasks/common/tbd.yml
    # osx
    - name: "pre_tasks | osx - prerequisites"
      include_tasks: pre_tasks/osx/prerequisites.yml
      when: ansible_os_family == "Darwin"
    - name: "pre_tasks | osx - tbd"
      include_tasks: pre_tasks/osx/tbd.yml
      when: ansible_os_family == "Darwin"
    # fedora
    - name: "pre_tasks | fedora - prerequisites"
      include_tasks: pre_tasks/fedora/prerequisites.yml
      when: ansible_os_family == "RedHat"
    - name: "pre_tasks | fedora - tbd"
      include_tasks: pre_tasks/fedora/tbd.yml
      when: ansible_os_family == "RedHat"
    # -- INCLUDE GROUP_VARS -- #
    # osx
    - name: "group_vars | osx"
      include_vars:
        dir: group_vars/osx
        extensions:
          - yml
      when: ansible_os_family == "Darwin"
    # fedora linux
    - name: "group_vars | fedora"
      include_vars:
        dir: group_vars/fedora
        extensions:
          - yml
      when: ansible_os_family == "RedHat"
  # -- INCLUDE ROLES -- #
  # order of the roles is crucial, as some roles depend on the successful execution of preceding roles
  roles:
    # - { role: aerospace, tags: ["aerospace"] }
    - { role: dotfiles, tags: ["dotfiles"] }
    - { role: apps, tags: ["apps"] }
    # - { role: rust, tags: ["rust"] }
    # - { role: zsh, tags: ["zsh"] }
    # - { role: git, tags: ["git"] }
    # - { role: ssh, tags: ["ssh"] }
    # - { role: scripts, tags: ["scripts"] }
    # - { role: alacritty, tags: ["alacritty"] }
    # - { role: nvim, tags: ["nvim"] }
    # - { role: starship, tags: ["starship"] }
    # - { role: fonts, tags: ["fonts"] }
    - { role: settings, tags: ["settings"] }
    # - { role: karabiner, tags: ["karabiner"] }
