---
- name: "Rust | Check if cargo is installed"
  shell: command -v cargo
  environment:
    CARGO_HOME: "{{ XDG_CONFIG_HOME }}/cargo"
    RUSTUP_HOME: "{{ XDG_CONFIG_HOME }}/rustup"
    PATH: "{{ XDG_CONFIG_HOME }}/cargo/bin:{{ ansible_env.PATH }}" # TODO: not sure if this works
  register: cargo_exists
  ignore_errors: true

- name: "Rust | Download installer"
  when: cargo_exists is failed
  get_url:
    url: "https://sh.rustup.rs"
    dest: "{{ onesetup_tmpdir }}/rustup/rustup.rs" # TODO: ensure tmpdir exists
    mode: "0755"
    force: true

- name: "Rust | Installation"
  when: cargo_exists is failed
  shell: "{{ onesetup_tmpdir }}/rustup/rustup.rs -y --no-modify-path" # TODO: check if no-modify-path works
  environment:
    CARGO_HOME: "{{ XDG_CONFIG_HOME }}/cargo"
    RUSTUP_HOME: "{{ XDG_CONFIG_HOME }}/rustup"
