---
# Define Download Links
- name: "Define Caldigit Downloads"
  ansible.builtin.set_fact:
    caldigit_downloads:
      - name: "firmware-updater"
        url: "https://downloads.caldigit.com/TS5Plus/CalDigit_Thunderbolt_Firmware_Updater_v2.9.pkg.zip"
      - name: "disk-utility"
        url: "https://downloads.caldigit.com/CalDigit-Docking-Station-Utility.zip"
      - name: "apple-support"
        url: "https://downloads.caldigit.com/CalDigit-USB-Hub-Support-Driver.pkg.zip"

# Create tmp dirs
- name: "Create Caldigit tmpdir under {{ onesetup_tmpdir }}"
  ansible.builtin.file:
    path: "{{ onesetup_tmpdir }}/caldigit-{{ item.name }}"
    state: directory
    mode: "0755"
    owner: "root"
    group: "wheel"
  become: true
  loop: "{{ caldigit_downloads }}"
  loop_control:
    label: "{{ item.name }}"

# Download Packages as .zip files
- name: "Download Caldigit Packages"
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ onesetup_tmpdir }}/caldigit-{{ item.name }}/caldigit-{{ item.name }}.zip"
    mode: "0644"
    owner: "{{ USER }}"
    group: "staff"
  become: true
  loop: "{{ caldigit_downloads }}"
  loop_control:
    label: "{{ item.name }}"

# Extract Packages
- name: "Extract Caldigit Packages to tmpdir"
  ansible.builtin.unarchive:
    src: "{{ onesetup_tmpdir }}/caldigit-{{ item.name }}/caldigit-{{ item.name }}.zip"
    dest: "{{ onesetup_tmpdir }}/caldigit-{{ item.name }}"
    remote_src: true
  become: true
  loop: "{{ caldigit_downloads }}"
  loop_control:
    label: "{{ item.name }}"

# Find extracted installers
- name: "Find extracted installer"
  ansible.builtin.find:
    paths: "{{ onesetup_tmpdir }}/caldigit-{{ item.name }}"
    patterns: "*.pkg"
    recurse: true
  register: caldigit_pkgs
  loop: "{{ caldigit_downloads }}"
  loop_control:
    label: "{{ item.name }}"

- name: "Install Caldigit Packages"
  ansible.builtin.command:
    argv:
      - "installer"
      - "-pkg"
      - "{{ item.files[0].path }}"
      - "-target"
      - "/"
  become: true
  loop: "{{ caldigit_pkgs.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.files | length > 0
