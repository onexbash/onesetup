---
# Clone Dotfiles Repository
- name: "Clone Dotfiles Repository"
  ansible.builtin.git:
    repo: "{{ DOTFILES_REPO_HTTPS }}"
    clone: true
    dest: "{{ DOTFILES_DIR }}"
    force: false # respect local changes to prevent dotfile loss
    remote: origin
    update: true
    recursive: true # whether submodules should be included/skipped
  become: true
  register: dotfiles_clone
  failed_when: false # suppresses possible error message as this is handled down below
  # ignore_errors: true

# Prompt User if local changes can be overwritten
- name: "Prompt: Overwrite Local Dotfiles Directory?"
  ansible.builtin.pause:
    prompt: "Local modifications detected in {{ DOTFILES_DIR }}. Overwrite and lose local changes? [y/n]"
  register: dotfiles_overwrite_prompt
  when: dotfiles_clone is failed

# Clone Dotfiles Repository and force overwrite local changes (after user confirmation)
- name: "Clone Dotfiles Repository (force overwrite)"
  ansible.builtin.git:
    repo: "{{ DOTFILES_REPO_HTTPS }}"
    clone: true
    dest: "{{ DOTFILES_DIR }}"
    force: true # overwrite local changes as the user confirmed this
    remote: origin
    update: true
    recursive: true # whether submodules should be included/skipped
  become: true
  when:
    - dotfiles_clone is failed
    - dotfiles_overwrite_prompt.user_input | lower == 'y'

# Notify: Skipping Dotfiles Rollout
- name: "Info: Skipping Dotfiles Rollout.."
  ansible.builtin.debug:
    msg: "Skipping Dotfiles Rollout & continue playbook — local changes in {{ DOTFILES_DIR }} preserved."
  when:
    - dotfiles_clone is failed
    - dotfiles_overwrite_prompt.user_input | lower != 'y'

# Skip Dotfiles Role and continue playbook if User declined to overwrite local changes
- name: "Skip Dotfiles Role and continue playbook"
  meta: end_role
  when:
    - dotfiles_clone is failed
    - dotfiles_overwrite_prompt.user_input | lower != 'y'

# Copy: Global Shell Files
- name: "Copy: Global Shell Files"
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "0644"
    owner: "root"
    group: "wheel"
    force: true
    remote_src: true
  loop: "{{ shell_global }}"
  become: true

# Cleanup: Dotfiles (dest)
- name: "Cleanup: Dotfiles"
  ansible.builtin.file:
    path: "{{ item.dest }}"
    state: "absent"
    force: true
  loop: "{{ dotfiles }}"
  ignore_errors: true
  become: true

# Symlink: Dotfiles
- name: "Symlink: Dotfiles"
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: "link"
    force: true
  loop: "{{ dotfiles }}"
  ignore_errors: true
