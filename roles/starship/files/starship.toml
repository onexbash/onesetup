# -- PROMPT SETTINGS -- #
command_timeout = 200

# -- COLOR PALETTE -- #
palette = "mocha"
[palettes.mocha]
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
yellow = "#f9e2af"
green = "#a6e3a1"
sky = "#89dceb"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
base = "#1e1e2e"

# -- STYLE -- #
[character]
success_symbol = " [в•°в”Җп„Ғ](#cba6f7)"
error_symbol = " [в•°в”Җп„Ғ](#cba6f7)"

# -- SYSTEM INFO -- #
[username]
format = " [в•ӯв”Җ$user]($style)@"
style_user = "#cba6f7"         # mauve
style_root = "#cba6f7"         # mauve
show_always = true

[hostname]
format = "[$hostname]($style)"
style = "#cba6f7"                  # mauve
trim_at = "-"
ssh_only = false
disabled = false

[directory]
style = "#89b4fa"            # blue
truncation_length = 3
truncate_to_repo = false
read_only = " о©ө"
read_only_style = "#f38ba8" # red
home_symbol = "~"
truncation_symbol = "../"
format = " оҳЎ [$truncation_symbol]($repo_root_style)[$path]($style)[$read_only]($read_only_style)"

[cmd_duration]
disabled = true

# -- GIT -- #
[git_branch]
style = "#eba0ac"                                        # maroon
symbol = "пҗҳ "
format = " оҳЎ [$symbol$branch(:$remote_branch)]($style)"

# -- DISABLED MODULES -- #
[git_commit]
disabled = true
[git_state]
disabled = true
[git_metrics]
disabled = true
[git_status]
disabled = true

# -- TECHNOLOGIES -- #
[docker_context]
symbol = "пҢҲ"
format = "оҳЎ [$symbol]($style) "
style = "#a6e3a1"                                                          # green
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = true

[aws]
style = "#cba6f7" # mauve
symbol = "оҢҪ  "

[lua]
symbol = "оҳ  "
style = "#cba6f7"                           # mauve
format = " оҳЎ [$symbol($version )]($style)"

[golang]
style = "#cba6f7" # mauve
symbol = "оҳ§ "

[java]
style = "#cba6f7" # mauve
symbol = "оү– "

[python]
symbol = "оҳҶ "
format = ' оҳЎ [${symbol}(${version} )(\($virtualenv\) )]($style)'
style = "#cba6f7"                                                        # mauve
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3" ]
detect_extensions = ["py"]
version_format = "v${raw}"

[php]
symbol = "оҳҲ "
format = "оҳЎ [$symbol($version )]($style)"

[rust]
style = "#cba6f7" # mauve
symbol = "оһЁ "

[shlvl]
style = "#cba6f7" # mauve
symbol = "п„  "

[swift]
style = "#cba6f7" # mauve
symbol = "пҜЈ "

[nodejs]
style = "#cba6f7"                                # mauve
format = " оҳЎ [оҙҚ Node.js $version](#a6e3a1) "    # green
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]
